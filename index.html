    <script>
function togglePortfolio() {
    const portfolio = document.getElementById('mi-portafolio');
    const btn = document.getElementById('btn-portfolio');

    // Si está oculto, lo muestra. Si está visible, lo oculta.
    if (portfolio.classList.contains('show')) {
        portfolio.classList.remove('show');
        btn.innerHTML = '<i class="fas fa-briefcase"></i> Ver Portafolio';
    } else {
        portfolio.classList.add('show');
        btn.innerHTML = '<i class="fas fa-times"></i> Cerrar Portafolio';
        
        // Scroll suave hacia el portafolio cuando se abre
        setTimeout(() => {
            portfolio.scrollIntoView({ behavior: 'smooth' });
        }, 100);
    }
}
</script>
